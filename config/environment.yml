name: ar_mirror
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11
  
  # PyTorch with CUDA 12.1 (for NVIDIA RTX 2050)
  - pytorch::pytorch>=2.0.0
  - pytorch::torchvision>=0.15.0
  - pytorch::torchaudio>=2.0.0
  - pytorch::pytorch-cuda=12.1
  
  # Computer Vision
  - opencv>=4.8.0
  - numpy>=1.24.0
  
  # Deep Learning Utilities
  - pillow>=9.0.0
  - scipy>=1.10.0
  
  # Jupyter (optional, for development)
  - jupyter
  - ipykernel
  
  # Development Tools
  - pip
  
  # Install remaining dependencies via pip
  - pip:
      - mediapipe>=0.10.30
      - kaggle>=1.5.16
      - gdown>=4.7.1
