[build]
  command = "npm run build"
  publish = "build"
  base = "frontend/ar-mirror-ui"

[build.environment]
  NODE_VERSION = "18"
  # Ignore Python files in the root directory
  PYTHON_VERSION = ""

[build.ignore]
  # Ignore Python requirements and backend files
  command = "exit 0"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200